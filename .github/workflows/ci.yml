name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # 提交信息格式校验
  commitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint commit messages
        run: |
          # 获取 PR 的所有提交
          commits=$(git log --pretty=format:"%s" origin/main..HEAD)
          echo "$commits" | npx commitlint

  # TypeScript 类型检查
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugins/market-radar/scripts/package-lock.json

      - name: Install dependencies
        working-directory: plugins/market-radar/scripts
        run: npm ci

      - name: TypeScript type check
        working-directory: plugins/market-radar/scripts
        run: npx tsc --noEmit

  # Schema 校验
  schema-validate:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugins/market-radar/scripts/package-lock.json

      - name: Install dependencies
        working-directory: plugins/market-radar/scripts
        run: npm ci

      - name: Validate schemas
        working-directory: plugins/market-radar/scripts
        run: |
          # 校验所有 schema 文件是有效的 JSON
          for schema in ../schemas/*.schema.json; do
            echo "Validating $schema..."
            node -e "JSON.parse(require('fs').readFileSync('$schema', 'utf8'))"
          done
          echo "All schemas are valid JSON!"

  # 文件格式检查
  lint:
    name: File Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for trailing whitespace
        run: |
          # 检查 Markdown 文件是否有尾随空格
          find . -name "*.md" -not -path "./node_modules/*" -exec grep -l " $" {} \; | head -20 || true
          if find . -name "*.md" -not -path "./node_modules/*" -exec grep -l " $" {} \; | grep -q .; then
            echo "Warning: Some markdown files have trailing whitespace"
          else
            echo "No trailing whitespace found in markdown files"
          fi

      - name: Check for TODO comments
        run: |
          echo "Checking for TODO/FIXME comments..."
          grep -r --include="*.ts" --include="*.md" -n "TODO\|FIXME" . --exclude-dir=node_modules || echo "No TODO/FIXME found"

  # Summary
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [typecheck, schema-validate, lint]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.schema-validate.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"